<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/1734d95da4.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <script src="./main.js" defer></script>
  <body style="background-color: rgb(0, 0, 0)">
    <nav class="navbar"></nav>
    <ul class="navbar_menu">
      <li><a href="">NOTICE</a></li>
      <li><a href="">ACTIVITY</a></li>
      <li><a href="">ACHIEVEMENT</a></li>
      <li><a href="">VISION</a></li>
      <li><a href="">SUPPORT</a></li>
      <li><a href="">LOGIN</a></li>
    </ul>
    <div class="main-layout">
      <div class="left-content">
        <img src="likelion.png" style="width: 250px" alt="영대멋사로고" />
        <div class="main-sentence">
          <h1>영남대학교<br />멋쟁이사자처럼<br />13기</h1>
        </div>
        <div class="sentence">
          <p class="white">여러분을 진심으로 환영합니다!</p>
          <p class="white">
            멋쟁이사자처럼은 '성장 의지를 가진 사람들을 돕기 위해<br />
            존재합니다. 그리고 이들을 돕기 위한 가장 근본적이고<br />
            효과적인 방법은 교육이라고 생각합니다!
          </p>
          <div class="rounded">P&D</div>
          <div class="rounded">FE</div>
          <div class="rounded">BE</div>
        </div>
      </div>

      <div class="right-login">
        <div class="box" id="column-box">
          LOGIN
          <div class="mini">
            <form>
              <div class="icon">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" placeholder="username" />
              </div>
              <div class="icon">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="password" />
              </div>
              <button type="submit">로그인</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <button class="navbar_bars">
      <svg width="18" height="18" viewBox="0 0 18 18" class="">
        <polyline
          id="globalnav-menutrigger-bread-bottom"
          fill="none"
          stroke="currentColor"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          points="2 12, 16 12"
          class="globalnav-menutrigger-bread globalnav-menutrigger-bread-bottom"
        >
          <animate
            id="globalnav-anim-menutrigger-bread-bottom-open"
            attributeName="points"
            keyTimes="0;0.5;1"
            dur="0.24s"
            begin="indefinite"
            fill="freeze"
            calcMode="spline"
            keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
            values=" 2 12, 16 12; 2 9, 16 9; 3.5 15, 15 3.5"
          ></animate>
          <animate
            id="globalnav-anim-menutrigger-bread-bottom-close"
            attributeName="points"
            keyTimes="0;0.5;1"
            dur="0.24s"
            begin="indefinite"
            fill="freeze"
            calcMode="spline"
            keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
            values=" 3.5 15, 15 3.5; 2 9, 16 9; 2 12, 16 12"
          ></animate>
        </polyline>
        <polyline
          id="globalnav-menutrigger-bread-top"
          fill="none"
          stroke="currentColor"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          points="2 5, 16 5"
          class="globalnav-menutrigger-bread globalnav-menutrigger-bread-top"
        >
          <animate
            id="globalnav-anim-menutrigger-bread-top-open"
            attributeName="points"
            keyTimes="0;0.5;1"
            dur="0.24s"
            begin="indefinite"
            fill="freeze"
            calcMode="spline"
            keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
            values=" 2 5, 16 5; 2 9, 16 9; 3.5 3.5, 15 15"
          ></animate>
          <animate
            id="globalnav-anim-menutrigger-bread-top-close"
            attributeName="points"
            keyTimes="0;0.5;1"
            dur="0.24s"
            begin="indefinite"
            fill="freeze"
            calcMode="spline"
            keySplines="0.42, 0, 1, 1;0, 0, 0.58, 1"
            values=" 3.5 3.5, 15 15; 2 9, 16 9; 2 5, 16 5"
          ></animate>
        </polyline>
      </svg>
    </button>
  </body>
</html>
