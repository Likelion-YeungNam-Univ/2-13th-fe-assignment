<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css" />
</head>

<body>
    <div class="left-container">
        <div class="title">
            <img src="likelion.png" alt="likelion">
            <p>영남대학교<br />멋진사자처럼<br />13기</p>
        </div>
        <div class="story">
            <p>여러분을 진심으로 환영합니다!</p>
            <p>멋쟁이사자처럼은 '성장 의지를 가진 사람들'을 돕기 위해 존재합니다.
                그리고 이들을 돕기 위한 가장 근본적이고 효과적인 방법은 교육이라고
                생각합니다!</p>
        </div>
        <div class="part">
            <div>P&D</div>
            <div>FE</div>
            <div>BE</div>
        </div>
    </div>
    <div class="right-container">
        <form>
            <div class="login">
                <div class="login-title">LOGIN</div>
                <div class="login-function">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="username" />


                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="username" placeholder="password" />
                    <div class="login-button"><button>로그인</button></div>
                </div>

            </div>

        </form>

    </div>
</body>

</html>
