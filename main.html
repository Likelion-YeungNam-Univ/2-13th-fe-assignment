<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
    <script src="main.js"></script>
  </head>
  <body>
    <div id="container">
      <div id="inner">
        <div class="flexBox" id="leftDiv">
          <div id="titleContainer">
            <img src="likelion.png" alt="멋사로고" id="titleImg" />
            <div id="titleText">
              <span>영남대학교</span>
              <span>멋쟁이사자처럼</span>
              <span>13기</span>
            </div>
          </div>
          <div id="contentContainer">
            <div class="contentText">
              <span>여러분을 진심으로 환영합니다!</span>
            </div>
            <br />
            <br />
            <div class="contentText">
              <span>
                멋쟁이사자처럼은 '성장 의지를 가진 사람들을 돕기 위해
                존재합니다. 그리고 이들을 돕기 위한 가장 근본적이고 효과적인
                방법은 교육이라고 생각합니다!
              </span>
            </div>
          </div>
          <div id="loginBtnContainer">
            <button
              id="onlyLoginBtn"
              class="loginBtn"
              onclick="clickLoginBtn()"
            >
              로그인
            </button>
          </div>
          <div id="selectContainer">
            <div class="selectItem">P&D</div>
            <div class="selectItem">FE</div>
            <div class="selectItem">BE</div>
          </div>
        </div>
        <div class="flexBox" id="rightDiv">
          <form id="loginForm">
            <div id="loginHeader">
              <span>LOGIN</span>
            </div>
            <div id="inputContainer">
              <div class="inputDiv">
                <input
                  type="text"
                  name="username"
                  placeholder="username"
                  id="usernameInput"
                />
              </div>
              <div class="inputDiv">
                <input
                  type="password"
                  name="password"
                  placeholder="password"
                  id="passwordInput"
                />
              </div>
            </div>
            <div>
              <button id="formBackBtn">뒤로가기</button>
              <button id="formLoginBtn" class="loginBtn">로그인</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script>
      const clickLoginBtn = () => {
        const loginForm = document.getElementById("loginForm");
        const selectContainer = document.getElementById("selectContainer");
        const loginBtnContainer = document.getElementById("loginBtnContainer");
        const contentContainer = document.getElementById("contentContainer");
        const usernameInput = document.getElementById("usernameInput");
        const passwordInput = document.getElementById("passwordInput");
        const formLoginBtn = document.getElementById("formLoginBtn");
        const loginHeaderSpan = document
          .getElementById("loginHeader")
          .querySelector("span");
        const leftDiv = document.getElementById("leftDiv");
        const rightDiv = document.getElementById("rightDiv");

        loginForm.classList.toggle("active");
        selectContainer.classList.toggle("hide");
        loginBtnContainer.classList.toggle("hide");
        contentContainer.classList.toggle("hide");
        usernameInput.classList.toggle("active");
        passwordInput.classList.toggle("active");
        formLoginBtn.classList.toggle("active");

        loginHeaderSpan.style.display = "none";
        leftDiv.style.flex = "1";
        rightDiv.style.flex = "7";
      };
    </script>
  </body>
</html>
