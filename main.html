<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/f12e95d21e.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="left">
      <div class="container">
        <img src="likelion.png" alt="영대멋사로고" />
        <div class="text-box">
          <div>영남대학교</div>
          <div>멋쟁이사자처럼</div>
          <div>13기</div>
        </div>
      </div>
      <div class="message">
        <div>여러분을 진심으로 환영합니다!</div>
        <div style="margin-top: 40px">
          멋쟁이사자처럼은 '성장 의지를 가진 사람들을 돕기 위해
        </div>
        <div>존재합니다. 그리고 이들을 돕기 위한 가장 근본적이고</div>
        <div>효과적인 방법은 교육이라고 생각합니다!</div>
      </div>
      <div class="part">
        <div class="part-box">P&D</div>
        <div class="part-box">FE</div>
        <div class="part-box">BE</div>
      </div>
    </div>
    <form class="login">
      <div>LOGIN</div>
      <div class="input-box">
        <i class="fa-solid fa-user" style="color: #a2a5a9"></i>
        <input type="text" name="아이디" placeholder="username" />
      </div>
      <div class="input-box">
        <i class="fa-solid fa-lock" style="color: #989aa0"></i>
        <input type="password" name="비밀번호" placeholder="password" />
      </div>
      <button>로그인</button>
    </form>
    <button class="login_button">로그인</button>
  </body>
</html>
